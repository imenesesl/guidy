name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-storybook
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Storybooks
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint (includes max-lines 150)
        run: pnpm -r --if-present run lint

      - name: Stylelint (no hardcoded values in CSS)
        run: pnpm lint:css

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build core app
        run: pnpm build:core

      - name: Build Storybook (DS)
        run: pnpm storybook:build:ds

      - name: Build Storybook (Core)
        run: pnpm storybook:build:core

      - name: Assemble deployment
        run: |
          mkdir -p deploy/ds deploy/core
          cp -r packages/ds/storybook-static/* deploy/ds/
          cp -r apps/web/core/storybook-static/* deploy/core/
          cp .github/pages/index.html deploy/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
