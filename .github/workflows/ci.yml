name: CI — Quality Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format:check

      - name: ESLint (max-lines, no inline styles)
        run: pnpm -r --if-present run lint

      - name: Stylelint (no hardcoded values in CSS)
        run: pnpm lint:css

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests with coverage (80% threshold)
        run: pnpm test:coverage

      - name: Build core app
        run: pnpm build:core

      - name: Build landing app
        run: pnpm build:landing

      - name: Build Storybook (DS)
        run: pnpm storybook:build:ds

      - name: Build Storybook (Core)
        run: pnpm storybook:build:core

      - name: Build Storybook (Landing)
        run: pnpm storybook:build:landing
