<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guidy — Storybooks</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          'Roboto',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #121212;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 480px;
        padding: 2rem;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        color: #b3b3b3;
        font-size: 1.125rem;
        margin-bottom: 2.5rem;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .links a {
        display: block;
        padding: 1rem 1.5rem;
        background: #282828;
        border-radius: 0.5rem;
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        font-size: 1.125rem;
        transition: background 200ms;
      }
      .links a:hover {
        background: #1db954;
        color: #000;
      }
      .badge {
        display: inline-block;
        font-size: 0.75rem;
        background: #1db954;
        color: #000;
        padding: 0.15rem 0.5rem;
        border-radius: 9999px;
        font-weight: 700;
        margin-left: 0.5rem;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Guidy</h1>
      <p class="subtitle">Design System &amp; Component Libraries</p>
      <div class="links">
        <a href="./ds/"> Design System (DS) <span class="badge">Atoms &amp; Molecules</span> </a>
        <a href="./core/"> Core App <span class="badge">Features &amp; Pages</span> </a>
      </div>
    </div>
  </body>
</html>
