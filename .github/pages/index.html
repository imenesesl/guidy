<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guidy — Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Google Sans',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ---- Header ---- */
      .header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 3rem 2rem 1rem;
      }

      .logo {
        width: 48px;
        height: 48px;
        background: #1db954;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 1.5rem;
        color: #0a0a0a;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: #fff;
      }

      .tagline {
        text-align: center;
        color: #737373;
        font-size: 1rem;
        padding-bottom: 2.5rem;
      }

      /* ---- Main grid ---- */
      .hub {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
        padding: 0 2rem 4rem;
      }

      /* ---- Column ---- */
      .column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .column-title {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #525252;
        padding: 0 0.25rem 0.5rem;
        border-bottom: 1px solid #1a1a1a;
        margin-bottom: 0.25rem;
      }

      .column-title span {
        color: #1db954;
      }

      /* ---- Card ---- */
      .card {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem 1.5rem;
        background: #141414;
        border: 1px solid #1f1f1f;
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 240ms,
          background 240ms,
          transform 160ms;
      }

      .card:hover {
        border-color: #1db954;
        background: #1a1a1a;
        transform: translateY(-2px);
      }

      .card:active {
        transform: translateY(0);
      }

      /* Icon circle */
      .card-icon {
        flex-shrink: 0;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card-icon svg {
        width: 24px;
        height: 24px;
      }

      .card-icon--green {
        background: rgba(29, 185, 84, 0.12);
        color: #1db954;
      }

      .card-icon--purple {
        background: rgba(139, 92, 246, 0.12);
        color: #8b5cf6;
      }

      .card-icon--blue {
        background: rgba(56, 189, 248, 0.12);
        color: #38bdf8;
      }

      .card-icon--amber {
        background: rgba(251, 191, 36, 0.12);
        color: #fbbf24;
      }

      .card-icon--pink {
        background: rgba(236, 72, 153, 0.12);
        color: #ec4899;
      }

      /* Card text */
      .card-body {
        flex: 1;
        min-width: 0;
      }

      .card-name {
        font-size: 1.05rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.2rem;
      }

      .card-desc {
        font-size: 0.825rem;
        color: #737373;
        line-height: 1.4;
      }

      /* Arrow */
      .card-arrow {
        flex-shrink: 0;
        color: #404040;
        transition:
          color 240ms,
          transform 240ms;
      }

      .card:hover .card-arrow {
        color: #1db954;
        transform: translateX(3px);
      }

      /* ---- Footer ---- */
      .footer {
        text-align: center;
        padding: 2rem;
        font-size: 0.75rem;
        color: #404040;
      }

      /* ---- Responsive ---- */
      @media (max-width: 640px) {
        .hub {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }

        .header {
          padding: 2rem 1.5rem 0.75rem;
        }
      }
    </style>
  </head>
  <body>

    <div class="footer">Guidy &mdash; deployed automatically from main</div>
  </body>
</html>
